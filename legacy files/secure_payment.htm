<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN">
<html>
<head>
<title>Untitled Document</title>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1">
<link href="styles.css" rel="stylesheet" type="text/css">
</head>

<body>
<form name="form1" method="post" action="">
  <table width="450" border="0" cellpadding="6" cellspacing="0" class="formstylre">
    <tr> 
      <td colspan="2"> 
        <table width="100%" border="0" cellspacing="0" cellpadding="0">
          <tr> 
            <td class="text"><img src="Images/but-secure_payment.gif" width="120" height="45"><br>
              <hr size="1">
            </td>
          </tr>
        </table>
      </td>
    </tr>
    <tr> 
      <td width="30%" class="text"> 
        <div align="right">Name</div>
      </td>
      <td> 
        <input name="textfield5" type="text" class="formstylre">
      </td>
    </tr>
    <tr> 
      <td width="30%" class="text"> 
        <div align="right">Total Amount</div>
      </td>
      <td> 
        <input name="textfield" type="text" size="10" value="$450" class="formstylre">
      </td>
    </tr>
    <tr> 
      <td class="text"> 
        <div align="right">Card Type</div>
      </td>
      <td> 
        <select name="select2" class="formstylre">
          <option selected>Visa</option>
        </select>
      </td>
    </tr>
    <tr> 
      <td class="text"> 
        <div align="right">Card Number</div>
      </td>
      <td><span class="text"> 
        <input name="textfield4" type="text" size="35" class="formstylre">
        <br>
        <img src="Images/holder.gif" width="7" height="10"></span>(eg 4000 0000 
        0000 0002)</td>
    </tr>
    <tr> 
      <td align="left" valign="top" class="text"> 
        <div align="right">Expiry Date</div>
      </td>
      <td align="left" valign="top"> 
        <select name="select" class="formstylre">
          <option selected>1</option>
        </select>
        <select name="select3" class="formstylre">
          <option selected>2002</option>
        </select>
      </td>
    </tr>
    <tr> 
      <td align="left" valign="top" class="text"> 
        <div align="right">Card Verification Code</div>
      </td>
      <td align="left" valign="top"><span class="text"> 
        <input name="textfield42" type="text" size="10" class="formstylre">
        </span></td>
    </tr>
    <tr>
      <td align="left" valign="top" class="text">
        <div align="right">Name on Card</div>
      </td>
      <td align="left" valign="top"><span class="text"> 
        <input name="textfield43" type="text" size="35" class="formstylre">
        <br>
        <img src="Images/holder.gif" width="7" height="10"></span>(eg LOIS SMITH)<span class="text"> 
        </span></td>
    </tr>
    <tr> 
      <td align="left" valign="top" class="text">&nbsp;</td>
      <td align="left" valign="top"> 
        <p><img src="Images/but-pay.gif" width="94" height="22"><span class="text"><br>
          <img src="Images/holder.gif" width="7" height="10"></span></p>
        </td>
    </tr>
  </table>
</form>
</body>
</html>
